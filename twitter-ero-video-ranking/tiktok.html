<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🎬 极致性能竖屏流</title>
    <style>
        :root {
            --bg-color: #000000;
            --text-main: #ffffff;
            --text-sub: #cccccc;
            --accent: #fe2c55;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: pan-y; }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-color); color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden; /* 禁止 body 滚动 */
        }

        /* --- 密码保护 --- */
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95); z-index: 99999;
            display: flex; justify-content: center; align-items: center;
            backdrop-filter: blur(5px);
        }
        .login-box {
            background: #222; padding: 30px; border-radius: 12px;
            text-align: center; width: 80%; max-width: 320px;
            border: 1px solid #444;
        }
        .login-input {
            width: 100%; padding: 12px; margin: 15px 0;
            background: #333; border: 1px solid #555; color: white;
            border-radius: 6px; text-align: center; font-size: 16px; outline: none;
        }
        .login-input:focus { border-color: var(--accent); }
        .login-btn {
            width: 100%; padding: 12px; background: var(--accent);
            color: white; border: none; border-radius: 6px;
            font-weight: bold; cursor: pointer; font-size: 16px;
        }
        .login-error { color: #ff4444; font-size: 14px; margin-top: 10px; display: none; }

        /* --- 核心滚动容器 --- */
        #video-container {
            width: 100%; height: 100%;
            overflow-y: scroll;
            overflow-x: hidden;
            scroll-snap-type: y mandatory;
            scroll-behavior: auto; /* 关键：禁用平滑滚动，保证滑动跟手和惯性自然 */
            -webkit-overflow-scrolling: touch;
            will-change: scroll-position; /* 性能优化 */
        }
        #video-container::-webkit-scrollbar { display: none; }
        #video-container { scrollbar-width: none; }

        /* --- 视频卡片 --- */
        .video-card {
            position: relative;
            width: 100%; height: 100%;
            scroll-snap-align: start;
            background: #000;
            contain: strict; /* 关键：严格隔离样式和布局，提升销毁/重建性能 */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .video-frame {
            width: 100%; height: 100%;
            border: none;
            display: block;
            pointer-events: none; /* 默认禁止交互，让滑动穿透 */
            background: #000;
            visibility: hidden; /* 默认隐藏，防止未加载完成闪烁 */
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .video-frame.loaded {
            visibility: visible;
            opacity: 1;
        }

        /* 激活状态：允许交互 */
        .video-card.active .video-frame {
            pointer-events: auto;
        }

        /* 交互遮罩：覆盖在 iframe 上，捕获点击以激活，但不捕获滑动 */
        .interaction-shield {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 20;
            background: transparent;
            /* 不需要 pointer-events: none，因为我们需要它捕获 click 来激活 */
            /* 但滑动是浏览器的原生行为，只要不 preventDefault 就能穿透 */
        }
        
        /* 激活后隐藏遮罩 */
        .video-card.active .interaction-shield {
            pointer-events: none;
            opacity: 0;
        }

        .tap-hint {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            pointer-events: none;
            opacity: 1;
            transition: opacity 0.3s;
            z-index: 15;
            text-align: center;
        }
        .video-card.active .tap-hint { opacity: 0; }

        .video-overlay {
            position: absolute;
            bottom: 0; left: 0; width: 100%;
            padding: 20px 15px 80px 15px;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            pointer-events: none;
            z-index: 30;
        }
        .video-account {
            font-size: 18px; font-weight: 700; margin-bottom: 8px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }
        .video-meta {
            font-size: 14px; color: var(--text-sub);
            display: flex; gap: 15px; align-items: center;
        }

        .loading-state, .empty-state {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center; z-index: 50; color: #fff;
        }
        .loading-state {
            background: rgba(0,0,0,0.7); padding: 15px 30px;
            border-radius: 30px; display: none;
        }
        .empty-state { display: none; width: 80%; }
    </style>
</head>
<body>

    <!-- 1. 密码保护 -->
    <div id="login-overlay">
        <div class="login-box">
            <h2 style="margin:0 0 10px 0;">🔒 验证访问</h2>
            <p style="font-size:12px; color:#aaa; margin:0;">请输入密码</p>
            <input type="password" id="passwordInput" class="login-input" placeholder="密码" autofocus>
            <button onclick="checkPassword()" class="login-btn">进入</button>
            <p id="loginError" class="login-error">密码错误！</p>
        </div>
    </div>

    <!-- 2. 视频流容器 -->
    <div id="video-container">
        <!-- 动态插入，仅保留 2 个节点 -->
    </div>

    <!-- 3. 状态 -->
    <div id="loading-msg" class="loading-state">正在初始化队列...</div>
    <div id="empty-msg" class="empty-state">
        <h2>😕 未找到合适的视频</h2>
        <p>数据源中可能没有符合竖屏 (A&lt;B) 分辨率的视频。</p>
    </div>

    <script>
        // ================= 配置 =================
        const CORRECT_PASSWORD = "821025";
        const COOKIE_AUTH = "tiktok_perf_auth";
        const COOKIE_PROGRESS = "tiktok_perf_progress";
        const DATA_URL = 'https://wget.la/https://raw.githubusercontent.com/maxlay/maxlay.github.io/main/twitter-ero-video-ranking/data-part-0.json';
        
        let allVideos = []; 
        let currentIndex = -1;
        let lastScrollTop = 0;
        let scrollFrameId = null;
        let isRestoring = false;

        // ================= 密码逻辑 =================
        function setPermanentCookie(name, value, days = 3650) {
            const date = new Date();
            date.setFullYear(date.getFullYear() + 10);
            document.cookie = `${name}=${encodeURIComponent(value)}; expires=${date.toUTCString()}; path=/; SameSite=Strict`;
        }
        function getCookie(name) {
            const match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
            return match ? decodeURIComponent(match[2]) : null;
        }
        function checkPassword() {
            const input = document.getElementById('passwordInput').value;
            const errorMsg = document.getElementById('loginError');
            if (input === CORRECT_PASSWORD) {
                setPermanentCookie(COOKIE_AUTH, "true");
                document.getElementById('login-overlay').style.display = 'none';
                initApp();
            } else {
                errorMsg.style.display = 'block';
                setTimeout(() => {
                    window.close();
                    if (!window.closed) document.body.innerHTML = '<div style="color:red;text-align:center;margin-top:20%"><h1>⛔ 拒绝访问</h1></div>';
                }, 1500);
            }
        }
        document.getElementById('passwordInput').addEventListener('keypress', e => { if(e.key==='Enter') checkPassword(); });

        (function() {
            if (getCookie(COOKIE_AUTH) === "true") {
                document.getElementById('login-overlay').style.display = 'none';
                setTimeout(initApp, 50);
            } else {
                document.body.style.overflow = 'hidden';
            }
        })();

        // ================= 核心逻辑 =================

        async function initApp() {
            const loadingEl = document.getElementById('loading-msg');
            const emptyEl = document.getElementById('empty-msg');
            
            loadingEl.style.display = 'block';
            loadingEl.innerText = "下载并排序中...";

            try {
                const res = await fetch(DATA_URL);
                if (!res.ok) throw new Error('网络失败');
                const data = await res.json();
                const rawData = Array.isArray(data) ? data : (data.data || []);

                // 1. 筛选竖屏
                let filtered = filterVerticalVideos(rawData);
                
                // 2. 排序：旧 -> 新 (升序)
                // 索引 0 = 最旧，索引 N = 最新
                // 向上滑 (scrollTop 增加) = 索引增加 = 看新视频
                filtered.sort((a, b) => {
                    const timeA = new Date(a.posted_at || 0).getTime();
                    const timeB = new Date(b.posted_at || 0).getTime();
                    return timeA - timeB;
                });

                allVideos = filtered;
                loadingEl.style.display = 'none';

                if (allVideos.length === 0) {
                    emptyEl.style.display = 'block';
                    return;
                }

                // 3. 恢复进度
                await restoreProgress();

                // 4. 初始渲染 (当前 + 下一个)
                renderStrictRange();

                // 5. 绑定高性能滚动监听
                setupHighPerfScroll();
                setupInteraction();

            } catch (err) {
                console.error(err);
                loadingEl.innerText = '失败：' + err.message;
                loadingEl.style.color = '#ff4444';
                loadingEl.style.background = 'rgba(50,0,0,0.8)';
            }
        }

        function filterVerticalVideos(videos) {
            return videos.filter(item => {
                if (!item.url) return false;
                const regex = /(\d+)x(\d+)/i;
                const match = item.url.match(regex);
                if (match) {
                    const w = parseInt(match[1], 10);
                    const h = parseInt(match[2], 10);
                    return w < h; // 严格竖屏
                }
                return false;
            });
        }

        async function restoreProgress() {
            const progressStr = getCookie(COOKIE_PROGRESS);
            const container = document.getElementById('video-container');
            
            if (progressStr) {
                try {
                    const progress = JSON.parse(progressStr);
                    const index = allVideos.findIndex(v => v.id === progress.id);
                    
                    if (index !== -1) {
                        currentIndex = index;
                        isRestoring = true;
                        
                        // 强制滚动到指定位置
                        const cardHeight = window.innerHeight;
                        container.scrollTop = index * cardHeight;
                        
                        // 等待滚动完成
                        await new Promise(r => setTimeout(r, 100));
                        isRestoring = false;
                        console.log(`✅ 已恢复至索引: ${index}`);
                        return;
                    }
                } catch (e) { console.warn("进度解析失败", e); }
            }
            currentIndex = 0;
            container.scrollTop = 0;
        }

        function saveProgress(index) {
            if (index < 0 || index >= allVideos.length) return;
            const video = allVideos[index];
            const data = { id: video.id, index: index, ts: Date.now() };
            const date = new Date();
            date.setDate(date.getDate() + 7);
            document.cookie = `${COOKIE_PROGRESS}=${encodeURIComponent(JSON.stringify(data))}; expires=${date.toUTCString()}; path=/; SameSite=Strict`;
        }

        // 【核心】严格范围渲染：只保留 Current 和 Next (共 2 个)
        function renderStrictRange() {
            const container = document.getElementById('video-container');
            const targetCurrent = currentIndex;
            const targetNext = currentIndex + 1;

            // 1. 清理：移除所有不在 [targetCurrent, targetNext] 范围内的 DOM
            const cards = Array.from(container.children);
            cards.forEach(card => {
                const idx = parseInt(card.dataset.index);
                if (idx !== targetCurrent && idx !== targetNext) {
                    card.remove(); // 彻底销毁，释放内存
                }
            });

            // 2. 补充：如果缺失 Current 或 Next，则创建
            [targetCurrent, targetNext].forEach(idx => {
                if (idx >= 0 && idx < allVideos.length) {
                    if (!document.querySelector(`.video-card[data-index="${idx}"]`)) {
                        createVideoCard(idx, container, idx === targetCurrent);
                    }
                }
            });

            // 3. 更新激活状态
            updateActiveState(targetCurrent);
            
            // 4. 保存进度
            if (!isRestoring) saveProgress(targetCurrent);
        }

        function createVideoCard(index, container, isActive) {
            const item = allVideos[index];
            const card = document.createElement('div');
            card.className = 'video-card';
            if (isActive) card.classList.add('active');
            card.dataset.index = index;

            // 策略：
            // Current: 立即加载 src
            // Next: 立即加载 src (预加载)，但因为不是 active 且有遮罩，通常不会自动播放声音/画面，仅缓冲
            const src = item.url;

            card.innerHTML = `
                <iframe class="video-frame" 
                    src="${src}" 
                    scrolling="no" 
                    allow="autoplay; encrypted-media; fullscreen; picture-in-picture"
                    data-index="${index}">
                </iframe>
                <div class="interaction-shield"></div>
                <div class="tap-hint">${isActive ? '点击交互' : '预加载中...'}</div>
                <div class="video-overlay">
                    <div class="video-account">@${item.tweet_account || 'Unknown'}</div>
                    <div class="video-meta">
                        <span>❤️ ${formatNum(item.favorite)}</span>
                        <span>👁️ ${formatNum(item.pv)}</span>
                        <span>📅 ${item.posted_at ? new Date(item.posted_at).toLocaleDateString() : ''}</span>
                    </div>
                </div>
            `;

            // 插入到正确顺序
            const existing = Array.from(container.children);
            const nextNode = existing.find(c => parseInt(c.dataset.index) > index);
            if (nextNode) container.insertBefore(card, nextNode);
            else container.appendChild(card);

            // 监听 iframe 加载完成，显示画面
            const iframe = card.querySelector('iframe');
            iframe.addEventListener('load', () => {
                iframe.classList.add('loaded');
            });
        }

        function updateActiveState(activeIndex) {
            const cards = document.querySelectorAll('.video-card');
            cards.forEach(card => {
                const idx = parseInt(card.dataset.index);
                if (idx === activeIndex) {
                    card.classList.add('active');
                    card.querySelector('.tap-hint').innerText = '点击交互';
                } else {
                    card.classList.remove('active');
                    card.querySelector('.tap-hint').innerText = '预加载中...';
                }
            });
        }

        // 高性能滚动监听 (使用 requestAnimationFrame)
        function setupHighPerfScroll() {
            const container = document.getElementById('video-container');
            const cardHeight = window.innerHeight;

            const onScroll = () => {
                const scrollTop = container.scrollTop;
                // 计算最近的索引
                const newIndex = Math.round(scrollTop / cardHeight);

                // 只有当索引变化且非恢复模式时才更新
                if (newIndex !== currentIndex && !isRestoring) {
                    currentIndex = Math.max(0, Math.min(newIndex, allVideos.length - 1));
                    
                    // 使用 rAF 批量更新 DOM，避免频繁重绘
                    if (scrollFrameId) cancelAnimationFrame(scrollFrameId);
                    scrollFrameId = requestAnimationFrame(() => {
                        renderStrictRange();
                    });
                }
                
                lastScrollTop = scrollTop;
            };

            container.addEventListener('scroll', onScroll, { passive: true });
        }

        function setupInteraction() {
            const container = document.getElementById('video-container');
            container.addEventListener('click', (e) => {
                const shield = e.target.closest('.interaction-shield');
                if (shield) {
                    const card = shield.parentElement;
                    const idx = parseInt(card.dataset.index);
                    
                    // 激活当前点击的
                    currentIndex = idx;
                    
                    // 重新渲染以确保 DOM 状态正确 (可能会把原来的 Next 变成 Current，并加载新的 Next)
                    renderStrictRange();
                }
            });
        }

        function formatNum(num) {
            if (!num) return '0';
            num = parseInt(num);
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'k';
            return num.toString();
        }
    </script>
</body>
</html>
