    <style>
        /* --- 原有 Footer 样式 --- */
        footer {
            margin-top: 40px;
            padding: 30px 15px;
            border-top: 1px solid #333;
            background-color: var(--bg-color);
            color: var(--text-sub);
            text-align: center;
            font-size: 0.85rem;
            line-height: 1.6;
        }

        .footer-points {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .footer-points li {
            position: relative;
            white-space: nowrap;
        }

        @media (min-width: 600px) {
            .footer-points li:not(:last-child)::after {
                content: "•";
                margin-left: 12px;
                color: #555;
                display: inline-block;
            }
        }

        .footer-points a {
            color: var(--text-sub);
            text-decoration: none;
            transition: color 0.2s;
        }
        .footer-points a:hover {
            color: var(--accent);
        }

        .clickable-text {
            cursor: pointer;
            transition: color 0.2s, text-decoration 0.2s;
            text-decoration: none;
            color: inherit;
        }
        .clickable-text:hover {
            color: var(--accent);
            text-decoration: underline;
        }

        /* --- 新增：返回顶部按钮样式 --- */
        #back-to-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 9999;
            width: 50px;
            height: 50px;
            background-color: var(--accent, #ff4757);
            color: #fff;
            border: none;
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            cursor: pointer;
            opacity: 0;
            visibility: hidden;
            transform: translateY(20px);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            outline: none;
        }

        #back-to-top.show {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        #back-to-top:hover {
            background-color: var(--bg-color, #333);
            color: var(--accent, #ff4757);
            transform: translateY(-5px);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.4);
        }

        #back-to-top i {
            font-size: 20px;
            margin-bottom: 2px;
            font-style: normal;
            line-height: 1;
        }

        #back-to-top span {
            font-size: 10px;
            line-height: 1;
        }
        
        @media (max-width: 600px) {
            #back-to-top {
                bottom: 20px;
                right: 20px;
                width: 45px;
                height: 45px;
            }
        }

        /* --- 新增：顶部管理按钮的间距调整 --- */

    <!-- 【新增】自定义脚本：处理注销逻辑 & 返回顶部 & 按钮同步 -->
    <script>
        // 1. 注销逻辑
        function deleteAuthCookie() {
            const cookieName = 'x_video_auth_verified';
            document.cookie = `${cookieName}=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;`;
            console.log(`尝试删除 Cookie: ${cookieName}`);
            setTimeout(() => {
                alert('已清除验证信息 (PIN 码)，页面将刷新以重新登录。');
                window.location.reload();
            }, 100);
        }

        // 2. 返回顶部功能逻辑
        (function() {
            const backToTopBtn = document.getElementById('back-to-top');
            const percentSpan = document.getElementById('back-to-top-percent');
            
            if (!backToTopBtn) return;

            window.addEventListener('scroll', function() {
                const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
                const scrollHeight = document.documentElement.scrollHeight - document.documentElement.clientHeight;
                
                let scrollPercent = 0;
                if (scrollHeight > 0) {
                    scrollPercent = Math.round((scrollTop / scrollHeight) * 100);
                }
                
                percentSpan.textContent = scrollPercent + '%';

                if (scrollTop > 300) {
                    backToTopBtn.classList.add('show');
                } else {
                    backToTopBtn.classList.remove('show');
                }
            });

            backToTopBtn.addEventListener('click', function() {
                window.scrollTo({
                    top: 0,
                    behavior: 'smooth'
                });
            });
        })();

        // 3. 【重要】同步顶部和底部管理按钮的显示状态
        // 由于外部 JS (core.js/init.js) 可能只控制底部的 #bottom-manager-buttons
        // 我们这里做一个观察器，一旦底部状态改变，立刻同步给顶部
        (function() {
            const bottomBtns = document.getElementById('bottom-manager-buttons');
            const topBtns = document.getElementById('top-manager-buttons');
            
            if (!bottomBtns || !topBtns) return;

            // 定义同步函数
            function syncButtons() {
                const isBottomVisible = bottomBtns.style.display !== 'none';
                topBtns.style.display = isBottomVisible ? 'flex' : 'none'; // 假设原样式是 flex，如果是 block 请改回 block
            }

            // 初始化时同步一次
            syncButtons();

            // 创建一个 MutationObserver 来监听底部按钮的 style 属性变化
            const observer = new MutationObserver(function(mutations) {
                mutations.forEach(function(mutation) {
                    if (mutation.attributeName === 'style') {
                        syncButtons();
                    }
                });
            });

            observer.observe(bottomBtns, { attributes: true });

            // 绑定顶部按钮的点击事件到对应的底部按钮逻辑上
            // 这样点击顶部的“收藏夹”，实际上触发的是底部按钮的点击事件（复用原有逻辑）
            document.getElementById('top-btn-open-favorites').addEventListener('click', function() {
                document.getElementById('btn-open-favorites').click();
            });
            document.getElementById('top-btn-open-recycle').addEventListener('click', function() {
                document.getElementById('btn-open-recycle').click();
            });
        })();
    </script>
