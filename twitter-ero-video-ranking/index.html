<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> 🔞 ✖.com 的视频🔞 </title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --card-bg: #2d2d2d;
            --text-main: #ffffff;
            --text-sub: #aaaaaa;
            --accent: #1db954;
            --hover: #3d3d3d;
            --progress-bg: #444;
            --btn-disabled: #2a2a2a;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        /* --- 密码保护相关样式 --- */
        #login-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 99999;
            backdrop-filter: blur(5px);
        }

        .login-box {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 300px;
            border: 1px solid #444;
        }

        .login-box h2 { margin-top: 0; color: var(--text-main); font-size: 20px; margin-bottom: 20px; }
        .login-input {
            width: 100%; padding: 12px; margin-bottom: 15px; background: #1a1a1a;
            border: 1px solid #555; color: white; border-radius: 6px;
            font-size: 16px; text-align: center; box-sizing: border-box; outline: none;
        }
        .login-input:focus { border-color: var(--accent); }
        .login-btn {
            width: 100%; padding: 12px; background-color: var(--accent); color: white;
            border: none; border-radius: 6px; font-size: 16px; cursor: pointer;
            font-weight: bold; transition: background 0.2s;
        }
        .login-btn:hover { background-color: #1ed760; }
        .login-error { color: #ff4444; font-size: 14px; margin-top: 15px; display: none; }

        /* 顶部控制栏 - 强制单行 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: nowrap; /* 禁止换行 */
            overflow: hidden;  /* 防止溢出 */
            padding-bottom: 15px;
            border-bottom: 1px solid #333;
        }

        .stats-container {
            display: flex;
            align-items: center;
            gap: 15px;
            white-space: nowrap; /* 关键：强制内容不换行 */
            overflow: hidden;
            text-overflow: ellipsis;
            flex-shrink: 1; /* 允许在极端情况下收缩 */
        }

        .stats-main { 
            font-size: 1.1rem; 
            color: var(--text-main); 
            font-weight: bold; 
        }

        .stats-sub {
            font-size: 0.95rem;
            color: var(--accent);
            font-weight: 600;
            background: rgba(29, 185, 84, 0.1);
            padding: 4px 10px;
            border-radius: 6px;
            display: inline-block;
            cursor: pointer; /* 提示可点击 */
            transition: all 0.2s;
            border: 1px solid rgba(29, 185, 84, 0.3);
        }

        .stats-sub:hover {
            background: rgba(29, 185, 84, 0.25);
            transform: translateY(-1px);
        }

        .stats-sub:active {
            transform: translateY(1px);
        }

        /* 进度条样式 */
        .progress-container {
            width: 100%; height: 6px; background-color: var(--progress-bg);
            border-radius: 3px; margin: 15px 0 25px 0; overflow: hidden;
            display: none; position: relative;
        }
        .progress-container.active { display: block; }
        .progress-bar {
            height: 100%; background-color: var(--accent); width: 0%;
            transition: width 0.3s ease-out; border-radius: 3px;
        }
        .progress-text {
            position: absolute; right: 0; top: -20px;
            font-size: 12px; color: var(--text-sub); white-space: nowrap;
        }

        /* 视频网格 */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card-bg); border-radius: 8px; overflow: hidden;
            cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
            position: relative; text-decoration: none; color: inherit; display: block;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            background: var(--hover);
        }
        .thumb-container {
            position: relative; width: 100%; padding-top: 177.77%; background: #000;
        }
        .thumb-img {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover;
        }
        .play-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.3); display: flex; align-items: center;
            justify-content: center; opacity: 0; transition: opacity 0.2s;
        }
        .card:hover .play-overlay { opacity: 1; }
        .play-icon {
            font-size: 40px; color: white; background: rgba(0,0,0,0.6);
            border-radius: 50%; width: 60px; height: 60px;
            display: flex; align-items: center; justify-content: center;
            border: 2px solid white;
        }
        .duration-badge {
            position: absolute; bottom: 8px; right: 8px;
            background: rgba(0,0,0,0.8); color: white;
            padding: 2px 6px; border-radius: 4px; font-size: 12px; font-weight: bold; z-index: 2;
        }
        .info { padding: 12px; }
        .title {
            font-size: 14px; font-weight: 600; margin-bottom: 8px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            color: var(--text-main);
        }
        .meta {
            font-size: 12px; color: var(--text-sub);
            display: flex; justify-content: space-between;
        }

        /* 分页控件 - 全新布局 */
        .pagination {
            display: flex; 
            justify-content: center; 
            gap: 15px;
            margin-top: 30px; 
            align-items: center; 
            flex-wrap: nowrap; /* 禁止换行 */
        }
        
        #top-pagination { margin-top: 0; margin-bottom: 20px; }

        .page-btn {
            background: var(--card-bg); border: 1px solid #555;
            color: white; padding: 10px 20px; border-radius: 6px;
            cursor: pointer; transition: 0.2s; font-weight: 500;
            display: flex; align-items: center; gap: 8px;
            min-width: 120px;
            justify-content: center;
        }

        .page-btn:hover:not(:disabled) { 
            background: var(--accent); 
            border-color: var(--accent); 
            transform: translateY(-2px);
        }
        
        .page-btn:disabled { 
            opacity: 0.4; 
            cursor: not-allowed; 
            background: var(--btn-disabled); 
            transform: none;
            border-color: #333;
        }

        .page-info-container {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #222;
            padding: 10px 20px;
            border-radius: 8px;
            border: 1px solid #444;
            min-width: 200px;
            justify-content: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .page-date {
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--text-main);
        }

        .page-count {
            font-size: 0.95rem;
            color: var(--accent);
            background: rgba(29, 185, 84, 0.15);
            padding: 3px 10px;
            border-radius: 12px;
            font-weight: 600;
        }

        .loading { text-align: center; padding: 50px; color: var(--text-sub); }
        .error { color: #ff4444; text-align: center; padding: 20px; }
        
        @media (max-width: 768px) {
            .header { flex-direction: column; align-items: flex-start; gap: 10px; }
            .stats-container { width: 100%; overflow-x: auto; white-space: nowrap; padding-bottom: 5px; }
            .grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .pagination { gap: 8px; }
            .page-btn { padding: 8px 12px; font-size: 13px; min-width: 80px; }
            .page-info-container { padding: 8px 12px; min-width: 140px; }
            .page-date { font-size: 0.95rem; }
            .page-count { font-size: 0.85rem; }
        }
    </style>
</head>
<body>

    <!-- 密码保护遮罩层 -->
    <div id="login-overlay">
        <div class="login-box">
            <h2>🔒 访问验证</h2>
            <input type="password" id="passwordInput" class="login-input" placeholder="请输入密码" autofocus>
            <button onclick="checkPassword()" class="login-btn">进入</button>
            <p id="loginError" class="login-error">密码错误！页面即将关闭...</p>
        </div>
    </div>

    <!-- 头部 -->
    <div class="header">
        <div class="stats-container">
            <div class="stats-main" id="stats-total">准备加载...</div>
            <!-- 增加点击事件 -->
            <div class="stats-sub" id="stats-newest" style="display:none;" title="点击跳转到最新一页">
                加载中...
            </div>
        </div>
    </div>

    <!-- 进度条 -->
    <div class="progress-container" id="progress-container">
        <span class="progress-text" id="progress-text">0%</span>
        <div class="progress-bar" id="progress-bar"></div>
    </div>

    <!-- 顶部分页控件 -->
    <div class="pagination" id="top-pagination" style="display:none;">
        <!-- 左边：最新/更新的一天 -->
        <button class="page-btn" id="top-newer-btn" disabled>最新的一天</button>
        
        <!-- 中间：当前日期 -->
        <div class="page-info-container">
            <span class="page-date" id="top-page-date">--</span>
            <span class="page-count" id="top-page-count">0 部</span>
        </div>

        <!-- 右边：更旧的一天 -->
        <button class="page-btn" id="top-older-btn" disabled>更旧的一天</button>
    </div>

    <!-- 视频列表 -->
    <div id="video-grid" class="grid"></div>
    <div id="loading-msg" class="loading" style="display:none;">正在初始化...</div>

    <!-- 底部分页控件 -->
    <div class="pagination" id="pagination" style="display:none;">
        <!-- 左边：最新/更新的一天 -->
        <button class="page-btn" id="newer-btn" disabled>最新的一天</button>
        
        <!-- 中间：当前日期 -->
        <div class="page-info-container">
            <span class="page-date" id="page-date">--</span>
            <span class="page-count" id="page-count">0 部</span>
        </div>

        <!-- 右边：更旧的一天 -->
        <button class="page-btn" id="older-btn" disabled>更旧的一天</button>
    </div>

    <script>
        // ================= 密码保护逻辑 =================
        const CORRECT_PASSWORD = "821025";
        const COOKIE_NAME = "x_video_auth_verified";
        
        function setPermanentCookie(name, value) {
            const date = new Date();
            date.setFullYear(date.getFullYear() + 10);
            document.cookie = `${name}=${encodeURIComponent(value)}; expires=${date.toUTCString()}; path=/; SameSite=Strict`;
        }

        function getCookie(name) {
            const match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
            if (match) return decodeURIComponent(match[2]);
            return null;
        }

        function checkPassword() {
            const input = document.getElementById('passwordInput').value;
            const errorMsg = document.getElementById('loginError');
            const overlay = document.getElementById('login-overlay');

            if (input === CORRECT_PASSWORD) {
                setPermanentCookie(COOKIE_NAME, "true");
                overlay.style.display = 'none';
                document.body.style.overflow = 'auto';
                init();
            } else {
                errorMsg.style.display = 'block';
                document.getElementById('passwordInput').value = '';
                setTimeout(() => {
                    window.close();
                    if (!window.closed) {
                        document.body.innerHTML = '<div style="color:red;text-align:center;margin-top:20%;"><h1>⛔ 访问拒绝</h1><p>密码错误</p></div>';
                    }
                }, 1500);
            }
        }

        document.getElementById('passwordInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') checkPassword();
        });

        (function() {
            if (getCookie(COOKIE_NAME) === "true") {
                document.getElementById('login-overlay').style.display = 'none';
                document.body.style.overflow = 'auto';
                setTimeout(init, 50);
            } else {
                document.body.style.overflow = 'hidden';
                document.getElementById('loading-msg').style.display = 'none';
            }
        })();

        // ================= 核心配置与数据逻辑 =================
        const DATA_URL = 'https://wget.la/https://raw.githubusercontent.com/maxlay/maxlay.github.io/main/twitter-ero-video-ranking/data-part-0.json'; 
        
        let allData = [];
        let groupedData = {}; 
        let sortedDates = []; 
        
        let currentDateKey = ""; 

        // DOM 元素
        const gridEl = document.getElementById('video-grid');
        const loadingEl = document.getElementById('loading-msg');
        const statsTotalEl = document.getElementById('stats-total');
        const statsNewestEl = document.getElementById('stats-newest');
        
        const paginationEl = document.getElementById('pagination');
        const topPaginationEl = document.getElementById('top-pagination');
        
        // 按钮定义：Newer (更新/最新), Older (更旧)
        const newerBtn = document.getElementById('newer-btn');
        const olderBtn = document.getElementById('older-btn');
        const topNewerBtn = document.getElementById('top-newer-btn');
        const topOlderBtn = document.getElementById('top-older-btn');

        const pageDateEl = document.getElementById('page-date');
        const pageCountEl = document.getElementById('page-count');
        const topPageDateEl = document.getElementById('top-page-date');
        const topPageCountEl = document.getElementById('top-page-count');

        const progressContainer = document.getElementById('progress-container');
        const progressBar = document.getElementById('progress-bar');
        const progressText = document.getElementById('progress-text');

        function formatDateKey(dateStr) {
            if (!dateStr) return "Unknown";
            try {
                const d = new Date(dateStr);
                if (isNaN(d.getTime())) return "Unknown";
                const y = d.getFullYear();
                const m = String(d.getMonth() + 1).padStart(2, '0');
                const day = String(d.getDate()).padStart(2, '0');
                return `${y}-${m}-${day}`;
            } catch (e) {
                return "Unknown";
            }
        }

        async function loadDataAndGroup() {
            progressContainer.classList.add('active');
            updateProgress(0, "开始下载远程数据...");

            try {
                const res = await fetch(DATA_URL);
                if (!res.ok) throw new Error(`下载失败 (HTTP ${res.status})`);

                updateProgress(40, "解析数据中...");
                const data = await res.json();
                
                if (Array.isArray(data)) {
                    allData = data;
                } else if (data.data && Array.isArray(data.data)) {
                    allData = data.data;
                } else {
                    allData = [data];
                }

                updateProgress(60, "按日期分组中...");
                
                groupedData = {};
                allData.forEach(item => {
                    const dateKey = formatDateKey(item.posted_at);
                    if (!groupedData[dateKey]) {
                        groupedData[dateKey] = [];
                    }
                    groupedData[dateKey].push(item);
                });

                // 降序排序：最新的日期在索引 0
                sortedDates = Object.keys(groupedData).sort((a, b) => {
                    return new Date(b) - new Date(a);
                });

                updateProgress(100, "加载完成");
                setTimeout(() => { progressContainer.classList.remove('active'); }, 800);
                
                return true;
            } catch (err) {
                throw err;
            }
        }

        function updateProgress(percent, text) {
            progressBar.style.width = `${percent}%`;
            progressText.innerText = text;
        }

        async function init() {
            if (loadingEl.style.display === 'none' && gridEl.children.length > 0) {
                 if(gridEl.children.length === 0) { /* continue */ } else { return; }
            }

            loadingEl.style.display = 'block';
            loadingEl.innerText = `正在加载并整理数据...`;
            
            try {
                await loadDataAndGroup();
                
                if (sortedDates.length === 0) {
                    loadingEl.innerHTML = "⚠️ 数据为空或日期格式无法识别";
                    return;
                }

                const totalCount = allData.length;
                const newestDate = sortedDates[0];
                const newestCount = groupedData[newestDate].length;

                statsTotalEl.innerText = `共 ${totalCount.toLocaleString()} 个视频`;
                statsNewestEl.style.display = 'inline-block';
                // 设置点击事件
                statsNewestEl.onclick = () => {
                    renderPage(newestDate);
                    window.scrollTo(0, 0);
                };
                statsNewestEl.innerText = `✨ 最新 (${newestDate}) 更新 ${newestCount} 部`;

                const savedDate = localStorage.getItem('videoListLastDate');
                if (savedDate && sortedDates.includes(savedDate)) {
                    currentDateKey = savedDate;
                } else {
                    currentDateKey = sortedDates[0];
                }

                loadingEl.style.display = 'none';
                
                paginationEl.style.display = 'flex';
                topPaginationEl.style.display = 'flex';
                
                renderPage(currentDateKey);
                setupEvents();

            } catch (err) {
                console.error(err);
                progressContainer.classList.remove('active');
                loadingEl.innerHTML = `❌ 加载失败: ${err.message}`;
                loadingEl.className = 'error';
            }
        }

        function renderPage(dateKey) {
            currentDateKey = dateKey;
            localStorage.setItem('videoListLastDate', dateKey);

            gridEl.innerHTML = '';
            
            const items = groupedData[dateKey] || [];
            
            if (items.length === 0) {
                gridEl.innerHTML = '<div style="grid-column: 1/-1; text-align:center;">该日期无数据</div>';
            } else {
                items.forEach(item => {
                    const card = createCard(item);
                    gridEl.appendChild(card);
                });
            }

            updatePaginationUI();
            window.scrollTo(0, 0);
        }

        function createCard(item) {
            const a = document.createElement('a');
            a.className = 'card';
            a.href = item.url;
            a.target = '_blank';
            a.rel = 'noopener noreferrer';
            
            const dateStr = item.posted_at ? new Date(item.posted_at).toLocaleDateString() : 'Unknown';
            const mins = Math.floor((item.time || 0) / 60);
            const secs = (item.time || 0) % 60;
            const durationStr = `${mins}:${secs.toString().padStart(2, '0')}`;
            const title = item.tweet_account ? `@${item.tweet_account}` : `ID: ${item.id}`;

            a.innerHTML = `
                <div class="thumb-container">
                    <img class="thumb-img" src="${item.thumbnail}" loading="lazy" alt="thumb" onerror="this.src='https://via.placeholder.com/300x533?text=No+Image'">
                    <div class="duration-badge">${durationStr}</div>
                    <div class="play-overlay">
                        <div class="play-icon">▶</div>
                    </div>
                </div>
                <div class="info">
                    <div class="title">${title}</div>
                    <div class="meta">
                        <span>👁️ ${formatNumber(item.pv)}</span>
                        <span>❤️ ${formatNumber(item.favorite)}</span>
                        <span>${dateStr}</span>
                    </div>
                </div>
            `;
            return a;
        }

        function updatePaginationUI() {
            const currentIndex = sortedDates.indexOf(currentDateKey);
            const count = groupedData[currentDateKey].length;
            const displayDate = currentDateKey; 

            pageDateEl.innerText = displayDate;
            pageCountEl.innerText = `${count} 部`;
            topPageDateEl.innerText = displayDate;
            topPageCountEl.innerText = `${count} 部`;

            // 逻辑定义：
            // sortedDates 是降序：[0]=最新, [1]=次新, ..., [last]=最旧
            // "Newer" (更新) = 索引更小 (currentIndex - 1)
            // "Older" (更旧) = 索引更大 (currentIndex + 1)

            const hasNewer = currentIndex > 0;
            const hasOlder = currentIndex < sortedDates.length - 1;

            // 更新按钮状态
            newerBtn.disabled = !hasNewer;
            olderBtn.disabled = !hasOlder;
            topNewerBtn.disabled = !hasNewer;
            topOlderBtn.disabled = !hasOlder;
            
            // 更新按钮文字
            if (hasNewer) {
                const newerDate = sortedDates[currentIndex - 1];
                const newerCount = groupedData[newerDate].length;
                const btnText = `${newerDate} (${newerCount})`;
                newerBtn.innerHTML = `⬅ ${btnText}`;
                topNewerBtn.innerHTML = `⬅ ${btnText}`;
            } else {
                newerBtn.innerHTML = `已是最新`;
                topNewerBtn.innerHTML = `已是最新`;
            }

            if (hasOlder) {
                const olderDate = sortedDates[currentIndex + 1];
                const olderCount = groupedData[olderDate].length;
                const btnText = `${olderDate} (${olderCount})`;
                olderBtn.innerHTML = `${btnText} ➡`;
                topOlderBtn.innerHTML = `${btnText} ➡`;
            } else {
                olderBtn.innerHTML = `已是最旧`;
                topOlderBtn.innerHTML = `已是最旧`;
            }
        }

        function setupEvents() {
            const goToNewer = () => {
                const idx = sortedDates.indexOf(currentDateKey);
                if (idx > 0) {
                    renderPage(sortedDates[idx - 1]);
                }
            };

            const goToOlder = () => {
                const idx = sortedDates.indexOf(currentDateKey);
                if (idx < sortedDates.length - 1) {
                    renderPage(sortedDates[idx + 1]);
                }
            };

            // 绑定事件：左边按钮 -> Newer, 右边按钮 -> Older
            newerBtn.onclick = goToNewer;
            olderBtn.onclick = goToOlder;
            topNewerBtn.onclick = goToNewer;
            topOlderBtn.onclick = goToOlder;
        }

        function formatNumber(num) {
            if (!num) return '0';
            num = parseInt(num);
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'k';
            return num.toString();
        }
    </script>
</body>
</html>
