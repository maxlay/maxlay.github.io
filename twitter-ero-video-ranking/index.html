<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> 🔞 ✖.com 的视频🔞 </title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --card-bg: #2d2d2d;
            --text-main: #ffffff;
            --text-sub: #aaaaaa;
            --accent: #1db954;
            --hover: #3d3d3d;
            --progress-bg: #444;
            --date-badge-bg: #1db954;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        /* --- 密码保护相关样式 --- */
        #login-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 99999;
            backdrop-filter: blur(5px);
        }

        .login-box {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 300px;
            border: 1px solid #444;
        }

        .login-box h2 { margin-top: 0; color: var(--text-main); font-size: 20px; margin-bottom: 20px; }
        .login-input {
            width: 100%; padding: 12px; margin-bottom: 15px; background: #1a1a1a;
            border: 1px solid #555; color: white; border-radius: 6px;
            font-size: 16px; text-align: center; box-sizing: border-box; outline: none;
        }
        .login-input:focus { border-color: var(--accent); }
        .login-btn {
            width: 100%; padding: 12px; background-color: var(--accent); color: white;
            border: none; border-radius: 6px; font-size: 16px; cursor: pointer;
            font-weight: bold; transition: background 0.2s;
        }
        .login-btn:hover { background-color: #1ed760; }
        .login-error { color: #ff4444; font-size: 14px; margin-top: 15px; display: none; }

        /* 顶部控制栏 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #333;
        }

        .stats-container {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .stats-main { 
            font-size: 1.2rem; 
            color: var(--text-main); 
            font-weight: bold; 
        }

        .stats-sub {
            font-size: 0.9rem;
            color: var(--accent);
            font-weight: 600;
            background: rgba(29, 185, 84, 0.1);
            padding: 2px 8px;
            border-radius: 4px;
            display: inline-block;
        }

        /* 进度条样式 */
        .progress-container {
            width: 100%; height: 6px; background-color: var(--progress-bg);
            border-radius: 3px; margin: 15px 0 25px 0; overflow: hidden;
            display: none; position: relative;
        }
        .progress-container.active { display: block; }
        .progress-bar {
            height: 100%; background-color: var(--accent); width: 0%;
            transition: width 0.3s ease-out; border-radius: 3px;
        }
        .progress-text {
            position: absolute; right: 0; top: -20px;
            font-size: 12px; color: var(--text-sub); white-space: nowrap;
        }

        /* 视频网格 */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card-bg); border-radius: 8px; overflow: hidden;
            cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
            position: relative; text-decoration: none; color: inherit; display: block;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            background: var(--hover);
        }
        .thumb-container {
            position: relative; width: 100%; padding-top: 177.77%; background: #000;
        }
        .thumb-img {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover;
        }
        .play-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.3); display: flex; align-items: center;
            justify-content: center; opacity: 0; transition: opacity 0.2s;
        }
        .card:hover .play-overlay { opacity: 1; }
        .play-icon {
            font-size: 40px; color: white; background: rgba(0,0,0,0.6);
            border-radius: 50%; width: 60px; height: 60px;
            display: flex; align-items: center; justify-content: center;
            border: 2px solid white;
        }
        .duration-badge {
            position: absolute; bottom: 8px; right: 8px;
            background: rgba(0,0,0,0.8); color: white;
            padding: 2px 6px; border-radius: 4px; font-size: 12px; font-weight: bold; z-index: 2;
        }
        .info { padding: 12px; }
        .title {
            font-size: 14px; font-weight: 600; margin-bottom: 8px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            color: var(--text-main);
        }
        .meta {
            font-size: 12px; color: var(--text-sub);
            display: flex; justify-content: space-between;
        }

        /* 分页控件 - 增强版 */
        .pagination {
            display: flex; justify-content: center; gap: 15px;
            margin-top: 30px; align-items: center; flex-wrap: wrap;
        }
        
        #top-pagination { margin-top: 0; margin-bottom: 20px; }

        .page-btn {
            background: var(--card-bg); border: 1px solid #555;
            color: white; padding: 10px 20px; border-radius: 6px;
            cursor: pointer; transition: 0.2s; font-weight: 500;
            display: flex; align-items: center; gap: 8px;
        }

        .page-btn:hover:not(:disabled) { 
            background: var(--accent); 
            border-color: var(--accent); 
            transform: translateY(-2px);
        }
        
        .page-btn:disabled { 
            opacity: 0.3; 
            cursor: not-allowed; 
            background: #222; 
            transform: none;
        }

        .page-info-container {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #222;
            padding: 8px 16px;
            border-radius: 6px;
            border: 1px solid #444;
        }

        .page-date {
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--text-main);
        }

        .page-count {
            font-size: 0.9rem;
            color: var(--accent);
            background: rgba(29, 185, 84, 0.15);
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: 600;
        }

        .loading { text-align: center; padding: 50px; color: var(--text-sub); }
        .error { color: #ff4444; text-align: center; padding: 20px; }
        
        @media (max-width: 600px) {
            .grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .header { flex-direction: column; align-items: stretch; gap: 15px; }
            .stats-container { align-items: center; }
            .pagination { gap: 10px; }
            .page-btn { padding: 8px 12px; font-size: 14px; }
            .page-info-container { flex-direction: column; gap: 4px; padding: 6px 12px; }
        }
    </style>
</head>
<body>

    <!-- 密码保护遮罩层 -->
    <div id="login-overlay">
        <div class="login-box">
            <h2>🔒 访问验证</h2>
            <input type="password" id="passwordInput" class="login-input" placeholder="请输入密码" autofocus>
            <button onclick="checkPassword()" class="login-btn">进入</button>
            <p id="loginError" class="login-error">密码错误！页面即将关闭...</p>
        </div>
    </div>

    <!-- 头部 -->
    <div class="header">
        <div class="stats-container">
            <div class="stats-main" id="stats-total">准备加载...</div>
            <div class="stats-sub" id="stats-newest" style="display:none;">正在计算...</div>
        </div>
    </div>

    <!-- 进度条 -->
    <div class="progress-container" id="progress-container">
        <span class="progress-text" id="progress-text">0%</span>
        <div class="progress-bar" id="progress-bar"></div>
    </div>

    <!-- 顶部分页控件 -->
    <div class="pagination" id="top-pagination" style="display:none;">
        <button class="page-btn" id="top-prev-btn">⬅ 上一天</button>
        <div class="page-info-container">
            <span class="page-date" id="top-page-date">--</span>
            <span class="page-count" id="top-page-count">0 部</span>
        </div>
        <button class="page-btn" id="top-next-btn">下一天 ➡</button>
    </div>

    <!-- 视频列表 -->
    <div id="video-grid" class="grid"></div>
    <div id="loading-msg" class="loading" style="display:none;">正在初始化...</div>

    <!-- 底部分页控件 -->
    <div class="pagination" id="pagination" style="display:none;">
        <button class="page-btn" id="prev-btn">⬅ 上一天</button>
        <div class="page-info-container">
            <span class="page-date" id="page-date">--</span>
            <span class="page-count" id="page-count">0 部</span>
        </div>
        <button class="page-btn" id="next-btn">下一天 ➡</button>
    </div>

    <script>
        // ================= 密码保护逻辑 =================
        const CORRECT_PASSWORD = "821025";
        const COOKIE_NAME = "x_video_auth_verified";
        
        function setPermanentCookie(name, value) {
            const date = new Date();
            date.setFullYear(date.getFullYear() + 10);
            document.cookie = `${name}=${encodeURIComponent(value)}; expires=${date.toUTCString()}; path=/; SameSite=Strict`;
        }

        function getCookie(name) {
            const match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
            if (match) return decodeURIComponent(match[2]);
            return null;
        }

        function checkPassword() {
            const input = document.getElementById('passwordInput').value;
            const errorMsg = document.getElementById('loginError');
            const overlay = document.getElementById('login-overlay');

            if (input === CORRECT_PASSWORD) {
                setPermanentCookie(COOKIE_NAME, "true");
                overlay.style.display = 'none';
                document.body.style.overflow = 'auto';
                init();
            } else {
                errorMsg.style.display = 'block';
                document.getElementById('passwordInput').value = '';
                setTimeout(() => {
                    window.close();
                    if (!window.closed) {
                        document.body.innerHTML = '<div style="color:red;text-align:center;margin-top:20%;"><h1>⛔ 访问拒绝</h1><p>密码错误</p></div>';
                    }
                }, 1500);
            }
        }

        document.getElementById('passwordInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') checkPassword();
        });

        (function() {
            if (getCookie(COOKIE_NAME) === "true") {
                document.getElementById('login-overlay').style.display = 'none';
                document.body.style.overflow = 'auto';
                setTimeout(init, 50);
            } else {
                document.body.style.overflow = 'hidden';
                document.getElementById('loading-msg').style.display = 'none';
            }
        })();

        // ================= 核心配置与数据逻辑 =================
        const DATA_URL = 'https://wget.la/https://raw.githubusercontent.com/maxlay/maxlay.github.io/main/twitter-ero-video-ranking/data-part-0.json'; 
        
        let allData = [];
        let groupedData = {}; // 结构: { "2026-03-10": [item1, item2], "2026-03-09": [...] }
        let sortedDates = []; // 结构: ["2026-03-10", "2026-03-09", ...] (降序)
        
        let currentDateKey = ""; // 当前查看的日期字符串，如 "2026-03-10"

        // DOM 元素
        const gridEl = document.getElementById('video-grid');
        const loadingEl = document.getElementById('loading-msg');
        const statsTotalEl = document.getElementById('stats-total');
        const statsNewestEl = document.getElementById('stats-newest');
        
        const paginationEl = document.getElementById('pagination');
        const topPaginationEl = document.getElementById('top-pagination');
        
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const topPrevBtn = document.getElementById('top-prev-btn');
        const topNextBtn = document.getElementById('top-next-btn');

        const pageDateEl = document.getElementById('page-date');
        const pageCountEl = document.getElementById('page-count');
        const topPageDateEl = document.getElementById('top-page-date');
        const topPageCountEl = document.getElementById('top-page-count');

        const progressContainer = document.getElementById('progress-container');
        const progressBar = document.getElementById('progress-bar');
        const progressText = document.getElementById('progress-text');

        // 辅助：格式化日期字符串 (YYYY-MM-DD)
        function formatDateKey(dateStr) {
            if (!dateStr) return "Unknown";
            try {
                const d = new Date(dateStr);
                if (isNaN(d.getTime())) return "Unknown";
                const y = d.getFullYear();
                const m = String(d.getMonth() + 1).padStart(2, '0');
                const day = String(d.getDate()).padStart(2, '0');
                return `${y}-${m}-${day}`;
            } catch (e) {
                return "Unknown";
            }
        }

        // 1. 加载并分组数据
        async function loadDataAndGroup() {
            progressContainer.classList.add('active');
            updateProgress(0, "开始下载远程数据...");

            try {
                const res = await fetch(DATA_URL);
                if (!res.ok) throw new Error(`下载失败 (HTTP ${res.status})`);

                updateProgress(40, "解析数据中...");
                const data = await res.json();
                
                if (Array.isArray(data)) {
                    allData = data;
                } else if (data.data && Array.isArray(data.data)) {
                    allData = data.data;
                } else {
                    allData = [data];
                }

                updateProgress(60, "按日期分组中...");
                
                // 核心逻辑：按日期分组
                groupedData = {};
                allData.forEach(item => {
                    const dateKey = formatDateKey(item.posted_at);
                    if (!groupedData[dateKey]) {
                        groupedData[dateKey] = [];
                    }
                    groupedData[dateKey].push(item);
                });

                // 对日期进行排序 (降序：最新的在前面)
                sortedDates = Object.keys(groupedData).sort((a, b) => {
                    return new Date(b) - new Date(a);
                });

                updateProgress(100, "加载完成");
                setTimeout(() => { progressContainer.classList.remove('active'); }, 800);
                
                return true;
            } catch (err) {
                throw err;
            }
        }

        function updateProgress(percent, text) {
            progressBar.style.width = `${percent}%`;
            progressText.innerText = text;
        }

        // 2. 初始化
        async function init() {
            if (loadingEl.style.display === 'none' && gridEl.children.length > 0) {
                 if(gridEl.children.length === 0) { /* continue */ } else { return; }
            }

            loadingEl.style.display = 'block';
            loadingEl.innerText = `正在加载并整理数据...`;
            
            try {
                await loadDataAndGroup();
                
                if (sortedDates.length === 0) {
                    loadingEl.innerHTML = "⚠️ 数据为空或日期格式无法识别";
                    return;
                }

                // 更新顶部统计
                const totalCount = allData.length;
                const newestDate = sortedDates[0];
                const newestCount = groupedData[newestDate].length;

                statsTotalEl.innerText = `共 ${totalCount.toLocaleString()} 个视频`;
                statsNewestEl.style.display = 'inline-block';
                statsNewestEl.innerText = `✨ 最新 (${newestDate}) 更新 ${newestCount} 部`;

                // 确定当前查看的日期
                const savedDate = localStorage.getItem('videoListLastDate');
                if (savedDate && sortedDates.includes(savedDate)) {
                    currentDateKey = savedDate;
                } else {
                    // 默认看最新的一天
                    currentDateKey = sortedDates[0];
                }

                loadingEl.style.display = 'none';
                
                // 显示分页
                paginationEl.style.display = 'flex';
                topPaginationEl.style.display = 'flex';
                
                renderPage(currentDateKey);
                setupEvents();

            } catch (err) {
                console.error(err);
                progressContainer.classList.remove('active');
                loadingEl.innerHTML = `❌ 加载失败: ${err.message}`;
                loadingEl.className = 'error';
            }
        }

        // 3. 渲染指定日期的页面
        function renderPage(dateKey) {
            currentDateKey = dateKey;
            localStorage.setItem('videoListLastDate', dateKey);

            gridEl.innerHTML = '';
            
            const items = groupedData[dateKey] || [];
            
            if (items.length === 0) {
                gridEl.innerHTML = '<div style="grid-column: 1/-1; text-align:center;">该日期无数据</div>';
            } else {
                // 可以在这里对单日内的数据进行二次排序（确保按时间倒序）
                // 假设原始数据已经是倒序，但为了保险可以再排一次
                // items.sort((a,b) => new Date(b.posted_at) - new Date(a.posted_at)); 
                
                items.forEach(item => {
                    const card = createCard(item);
                    gridEl.appendChild(card);
                });
            }

            updatePaginationUI();
            
            // 滚动到顶部
            window.scrollTo(0, 0);
        }

        // 4. 创建卡片 (保持原样)
        function createCard(item) {
            const a = document.createElement('a');
            a.className = 'card';
            a.href = item.url;
            a.target = '_blank';
            a.rel = 'noopener noreferrer';
            
            const dateStr = item.posted_at ? new Date(item.posted_at).toLocaleDateString() : 'Unknown';
            const mins = Math.floor((item.time || 0) / 60);
            const secs = (item.time || 0) % 60;
            const durationStr = `${mins}:${secs.toString().padStart(2, '0')}`;
            const title = item.tweet_account ? `@${item.tweet_account}` : `ID: ${item.id}`;

            a.innerHTML = `
                <div class="thumb-container">
                    <img class="thumb-img" src="${item.thumbnail}" loading="lazy" alt="thumb" onerror="this.src='https://via.placeholder.com/300x533?text=No+Image'">
                    <div class="duration-badge">${durationStr}</div>
                    <div class="play-overlay">
                        <div class="play-icon">▶</div>
                    </div>
                </div>
                <div class="info">
                    <div class="title">${title}</div>
                    <div class="meta">
                        <span>👁️ ${formatNumber(item.pv)}</span>
                        <span>❤️ ${formatNumber(item.favorite)}</span>
                        <span>${dateStr}</span>
                    </div>
                </div>
            `;
            return a;
        }

        // 5. 更新分页 UI
        function updatePaginationUI() {
            const currentIndex = sortedDates.indexOf(currentDateKey);
            const count = groupedData[currentDateKey].length;
            
            // 格式化显示的日期 (去掉横杠或者保持，这里保持 YYYY-MM-DD 清晰)
            const displayDate = currentDateKey; 

            // 更新文本
            pageDateEl.innerText = displayDate;
            pageCountEl.innerText = `${count} 部`;
            topPageDateEl.innerText = displayDate;
            topPageCountEl.innerText = `${count} 部`;

            // 按钮状态
            // 上一页：索引 + 1 (因为数组是降序，索引越大日期越旧)
            const hasPrev = currentIndex < sortedDates.length - 1;
            const hasNext = currentIndex > 0;

            prevBtn.disabled = !hasPrev;
            nextBtn.disabled = !hasNext;
            topPrevBtn.disabled = !hasPrev;
            topNextBtn.disabled = !hasNext;
            
            // 按钮文字提示 (可选：显示上一天/下一天的日期)
            if (hasPrev) {
                const prevDate = sortedDates[currentIndex + 1];
                const prevCount = groupedData[prevDate].length;
                prevBtn.innerHTML = `⬅ ${prevDate} (${prevCount})`;
                topPrevBtn.innerHTML = `⬅ ${prevDate} (${prevCount})`;
            } else {
                prevBtn.innerHTML = `⬅ 最早的一天`;
                topPrevBtn.innerHTML = `⬅ 最早的一天`;
            }

            if (hasNext) {
                const nextDate = sortedDates[currentIndex - 1];
                const nextCount = groupedData[nextDate].length;
                nextBtn.innerHTML = `${nextDate} (${nextCount}) ➡`;
                topNextBtn.innerHTML = `${nextDate} (${nextCount}) ➡`;
            } else {
                nextBtn.innerHTML = `最新的一天 ➡`;
                topNextBtn.innerHTML = `最新的一天 ➡`;
            }
        }

        function setupEvents() {
            const goToPrev = () => {
                const idx = sortedDates.indexOf(currentDateKey);
                if (idx < sortedDates.length - 1) {
                    renderPage(sortedDates[idx + 1]);
                }
            };

            const goToNext = () => {
                const idx = sortedDates.indexOf(currentDateKey);
                if (idx > 0) {
                    renderPage(sortedDates[idx - 1]);
                }
            };

            prevBtn.onclick = goToPrev;
            nextBtn.onclick = goToNext;
            topPrevBtn.onclick = goToPrev;
            topNextBtn.onclick = goToNext;
        }

        function formatNumber(num) {
            if (!num) return '0';
            num = parseInt(num);
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'k';
            return num.toString();
        }
    </script>
</body>
</html>
