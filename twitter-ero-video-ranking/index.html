<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔞 ✖.com 视频 </title>
    <!-- Flatpickr 样式 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css">
    <!-- 自定义样式 -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 1. 密码验证层 -->
    <div id="login-overlay">
        <div class="login-box">
            <h2>🔒 请输入访问密码</h2>
            <input type="password" id="passwordInput" placeholder="输入密码..." autocomplete="off" />
            <button onclick="checkPassword(document.getElementById('passwordInput').value)">进入系统</button>
            <p style="font-size:12px;color:#666;margin-top:15px;">提示：本站不存储任何图片和视频</p>
        </div>
    </div>

    <!-- 2. 全局加载提示 Toast (新增核心组件) -->
    <div id="loading-toast">正在初始化...</div>

    <!-- 3. 主内容区 -->
    <div class="container">
        <!-- 顶部导航栏 -->
        <div class="header">
            <div class="nav-left">
                <button id="top-newer-btn" class="nav-btn" disabled>⬅ 前一天</button>
                <button id="top-older-btn" class="nav-btn" disabled>后一天 ➡</button>
            </div>
            
            <div class="nav-center">
                <span id="top-page-date" class="date-display">--</span>
                <span id="top-page-count" class="count-badge">0 部</span>
                <button id="top-date-trigger" class="nav-btn icon-btn">📅 选择日期</button>
            </div>

            <div class="nav-right stats">
                <span class="stat-item">总计：<strong id="stats-total">0</strong></span>
                <span class="stat-item highlight" id="stats-newest">-</span>
                <button id="open-manager-btn" class="nav-btn small-btn" title="管理回收站">🗑️ 回收站</button>
            </div>
        </div>

        <!-- 4. 进度条容器 -->
        <div class="progress-container" id="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
            <div class="progress-text" id="progress-text">准备加载...</div>
        </div>

        <!-- 5. 视频网格区域 -->
        <div id="video-grid" class="grid">
            <div id="loading-msg" class="loading-state">
                <div class="spinner"></div>
                <p>正在连接服务器...</p>
            </div>
        </div>
        
        <!-- 6. 底部翻页控件 -->
        <div id="pagination" class="pagination-bar">
            <button id="newer-btn" class="nav-btn" disabled>⬅ 前一天</button>
            <span class="page-info">
                <span id="page-date">--</span> 
                (<span id="page-count">0</span> 部)
            </span>
            <button id="older-btn" class="nav-btn" disabled>后一天 ➡</button>
        </div>
    </div>

    <!-- 7. 账号详情弹窗 -->
    <div id="account-modal" class="modal-overlay">
        <div class="modal-content modal-large">
            <div id="account-modal-content">
                <!-- 动态内容 -->
            </div>
            <div id="account-modal-videos" class="modal-grid">
                <!-- 视频列表 -->
            </div>
        </div>
    </div>

    <!-- 8. 回收站管理弹窗 -->
    <div id="manager-modal" class="modal-overlay">
        <div class="modal-content modal-medium">
            <div class="modal-header">
                <h2>🗑️ 回收站管理</h2>
                <button id="manager-modal-close" class="close-btn">×</button>
            </div>
            <div class="modal-body">
                <p style="font-size:13px;color:#aaa;margin-bottom:15px;">被移入回收站的账号视频将不再显示。恢复后需重新加载数据。</p>
                <div id="recycle-list" class="recycle-list">
                    <!-- 列表内容 -->
                </div>
            </div>
        </div>
    </div>

    <!-- ================= 脚本引入 (顺序至关重要) ================= -->
    
    <!-- 1. 核心库 (配置、存储、工具函数) - 必须最先加载 -->
    <script src="core.js"></script>
    
    <!-- 2. 数据加载模块 -->
    <script src="loader.js"></script>
    
    <!-- 3. 渲染与交互模块 -->
    <script src="renderer.js"></script>
    <script src="modal-account.js"></script>
    <script src="modal-manager.js"></script>
    
    <!-- 4. 入口初始化 (最后加载) -->
    <script src="init.js"></script>
    
    <!-- 5. 第三方库 (Flatpickr 日期选择器) -->
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/zh.js"></script>
</body>
</html>
