<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎬 沉浸式竖屏视频流 (Iframe版)</title>
    <style>
        :root {
            --bg-color: #000000;
            --text-main: #ffffff;
            --text-sub: #cccccc;
            --accent: #fe2c55;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-color); color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
        }

        /* --- 密码保护遮罩层 --- */
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95); z-index: 99999;
            display: flex; justify-content: center; align-items: center;
            backdrop-filter: blur(5px);
        }
        .login-box {
            background: #222; padding: 30px; border-radius: 12px;
            text-align: center; width: 80%; max-width: 320px;
            border: 1px solid #444;
        }
        .login-input {
            width: 100%; padding: 12px; margin: 15px 0;
            background: #333; border: 1px solid #555; color: white;
            border-radius: 6px; text-align: center; font-size: 16px; outline: none;
        }
        .login-input:focus { border-color: var(--accent); }
        .login-btn {
            width: 100%; padding: 12px; background: var(--accent);
            color: white; border: none; border-radius: 6px;
            font-weight: bold; cursor: pointer; font-size: 16px;
        }
        .login-error { color: #ff4444; font-size: 14px; margin-top: 10px; display: none; }

        /* --- 核心滚动容器 --- */
        #video-container {
            width: 100%; height: 100%;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }
        #video-container::-webkit-scrollbar { display: none; }
        #video-container { scrollbar-width: none; }

        /* --- 视频卡片 --- */
        .video-card {
            position: relative;
            width: 100%; height: 100%;
            scroll-snap-align: start;
            background: #111;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Iframe 样式：填满卡片 */
        .video-frame {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            /* 关键：pointer-events 由 JS 控制，默认先禁止，防止误触导致无法滑动 */
            pointer-events: none; 
            background: #000;
        }

        /* 交互遮罩层：覆盖在 iframe 上面，用于捕获滑动事件 */
        .interaction-shield {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10;
            background: transparent;
            cursor: pointer;
            transition: opacity 0.3s;
        }
        
        /* 当激活交互模式时，隐藏遮罩，允许点击 iframe */
        .video-card.active .interaction-shield {
            opacity: 0;
            pointer-events: none;
        }
        .video-card.active .video-frame {
            pointer-events: auto;
        }

        /* 提示信息：点击以交互 */
        .tap-hint {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            pointer-events: none;
            opacity: 1;
            transition: opacity 0.3s;
            z-index: 5;
            text-align: center;
        }
        .video-card.active .tap-hint {
            opacity: 0;
        }

        /* 底部信息层 */
        .video-overlay {
            position: absolute;
            bottom: 0; left: 0; width: 100%;
            padding: 20px 15px 80px 15px;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            pointer-events: none;
            z-index: 20;
        }
        .video-account {
            font-size: 18px; font-weight: 700; margin-bottom: 8px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }
        .video-meta {
            font-size: 14px; color: var(--text-sub);
            display: flex; gap: 15px; align-items: center;
        }

        /* 状态提示 */
        .loading-state, .empty-state {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center; z-index: 50;
            color: #fff;
        }
        .loading-state {
            background: rgba(0,0,0,0.7); padding: 15px 30px;
            border-radius: 30px; display: none;
        }
        .empty-state {
            display: none; width: 80%;
        }
    </style>
</head>
<body>

    <!-- 1. 密码保护 -->
    <div id="login-overlay">
        <div class="login-box">
            <h2 style="margin:0 0 10px 0;">🔒 验证访问</h2>
            <p style="font-size:12px; color:#aaa; margin:0;">请输入密码</p>
            <input type="password" id="passwordInput" class="login-input" placeholder="密码" autofocus>
            <button onclick="checkPassword()" class="login-btn">进入</button>
            <p id="loginError" class="login-error">密码错误！</p>
        </div>
    </div>

    <!-- 2. 视频流容器 -->
    <div id="video-container">
        <!-- 动态插入 -->
    </div>

    <!-- 3. 状态 -->
    <div id="loading-msg" class="loading-state">正在筛选并加载竖屏视频...</div>
    <div id="empty-msg" class="empty-state">
        <h2>😕 未找到合适的视频</h2>
        <p>数据源中可能没有符合竖屏 (A&lt;B) 分辨率的视频。</p>
        <button onclick="location.reload()" style="margin-top:20px; padding:10px 20px; background:#333; color:white; border:none; border-radius:5px;">重试</button>
    </div>

    <script>
        // ================= 配置 =================
        const CORRECT_PASSWORD = "821025";
        const COOKIE_NAME = "tiktok_iframe_auth";
        const DATA_URL = 'https://wget.la/https://raw.githubusercontent.com/maxlay/maxlay.github.io/main/twitter-ero-video-ranking/data-part-0.json';
        
        let allVideos = [];

        // ================= 密码逻辑 =================
        function setPermanentCookie(name, value) {
            const date = new Date();
            date.setFullYear(date.getFullYear() + 10);
            document.cookie = `${name}=${encodeURIComponent(value)}; expires=${date.toUTCString()}; path=/; SameSite=Strict`;
        }
        function getCookie(name) {
            const match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
            return match ? decodeURIComponent(match[2]) : null;
        }
        function checkPassword() {
            const input = document.getElementById('passwordInput').value;
            const errorMsg = document.getElementById('loginError');
            if (input === CORRECT_PASSWORD) {
                setPermanentCookie(COOKIE_NAME, "true");
                document.getElementById('login-overlay').style.display = 'none';
                initApp();
            } else {
                errorMsg.style.display = 'block';
                setTimeout(() => {
                    window.close();
                    if (!window.closed) document.body.innerHTML = '<div style="color:red;text-align:center;margin-top:20%"><h1>⛔ 拒绝访问</h1></div>';
                }, 1500);
            }
        }
        document.getElementById('passwordInput').addEventListener('keypress', e => { if(e.key==='Enter') checkPassword(); });

        (function() {
            if (getCookie(COOKIE_NAME) === "true") {
                document.getElementById('login-overlay').style.display = 'none';
                setTimeout(initApp, 50);
            } else {
                document.body.style.overflow = 'hidden';
            }
        })();

        // ================= 核心逻辑 =================

        async function initApp() {
            const loadingEl = document.getElementById('loading-msg');
            const emptyEl = document.getElementById('empty-msg');
            const container = document.getElementById('video-container');

            loadingEl.style.display = 'block';

            try {
                const res = await fetch(DATA_URL);
                if (!res.ok) throw new Error('网络响应失败');
                const data = await res.json();
                const rawData = Array.isArray(data) ? data : (data.data || []);

                // 筛选竖屏
                allVideos = filterVerticalVideos(rawData);
                loadingEl.style.display = 'none';

                if (allVideos.length === 0) {
                    emptyEl.style.display = 'block';
                    return;
                }

                renderVideos(allVideos);
                setupInteraction();

            } catch (err) {
                console.error(err);
                loadingEl.innerText = '加载失败：' + err.message;
                loadingEl.style.color = '#ff4444';
                loadingEl.style.background = 'rgba(50,0,0,0.8)';
            }
        }

        function filterVerticalVideos(videos) {
            return videos.filter(item => {
                if (!item.url) return false;
                const regex = /(\d+)x(\d+)/i;
                const match = item.url.match(regex);
                if (match) {
                    const w = parseInt(match[1], 10);
                    const h = parseInt(match[2], 10);
                    return w < h; // 严格竖屏
                }
                return false;
            });
        }

        function renderVideos(videos) {
            const container = document.getElementById('video-container');
            const fragment = document.createDocumentFragment();

            videos.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'video-card';
                
                // 构建 Iframe
                // 注意：src 直接指向视频链接。Twitter 视频链接通常会重定向到一个播放页或直接流媒体
                // 如果直接链接无法在 iframe 播放，可能需要构造一个中间页，但这里先尝试直链
                // 为了兼容性，我们允许浏览器处理重定向
                const videoSrc = item.url;

                card.innerHTML = `
                    <iframe class="video-frame" 
                        src="${videoSrc}" 
                        scrolling="no" 
                        allow="autoplay; encrypted-media; fullscreen; picture-in-picture"
                        loading="lazy">
                    </iframe>
                    
                    <!-- 交互遮罩：默认存在，防止 iframe 拦截滑动 -->
                    <div class="interaction-shield"></div>
                    
                    <!-- 提示文字 -->
                    <div class="tap-hint">点击视频进行交互<br><span style="font-size:10px;opacity:0.7">(暂停/音量/全屏)</span></div>

                    <!-- 信息层 -->
                    <div class="video-overlay">
                        <div class="video-account">@${item.tweet_account || 'Unknown'}</div>
                        <div class="video-meta">
                            <span>❤️ ${formatNum(item.favorite)}</span>
                            <span>👁️ ${formatNum(item.pv)}</span>
                            <span>📅 ${item.posted_at ? new Date(item.posted_at).toLocaleDateString() : ''}</span>
                        </div>
                    </div>
                `;
                fragment.appendChild(card);
            });
            container.appendChild(fragment);
        }

        // 交互逻辑：解决 iframe 无法滑动的问题
        function setupInteraction() {
            const cards = document.querySelectorAll('.video-card');
            let activeCard = null;

            cards.forEach(card => {
                const shield = card.querySelector('.interaction-shield');
                
                // 点击遮罩 -> 激活当前卡片（允许操作视频）， deactivate 其他卡片
                shield.addEventListener('click', () => {
                    // 如果已经是激活状态，再次点击可以选择不取消，或者取消。这里设计为：点击空白处不取消，只有切换到下一张才取消
                    
                    // 取消其他卡片的激活状态
                    if (activeCard && activeCard !== card) {
                        activeCard.classList.remove('active');
                    }
                    
                    // 激活当前
                    card.classList.add('active');
                    activeCard = card;
                });
            });

            // 监听滚动，当卡片离开视口时，自动取消其激活状态（防止后台视频继续响应用户操作）
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (!entry.isIntersecting) {
                        entry.target.classList.remove('active');
                        if (activeCard === entry.target) {
                            activeCard = null;
                        }
                    }
                });
            }, { threshold: 0.5 });

            cards.forEach(card => observer.observe(card));
            
            // 全局点击检测：如果点击的不是视频区域（比如点击了底部的文字），也可以考虑是否取消激活
            // 但为了体验，通常保持激活直到滑动走
        }

        function formatNum(num) {
            if (!num) return '0';
            num = parseInt(num);
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'k';
            return num.toString();
        }
    </script>
</body>
</html>
