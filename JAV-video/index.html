    <script>
        console.log('✅ [Init] Global Logic Script Started');

        const STORAGE_KEY_WATCHED = 'video_watched_list';
        const STORAGE_KEY_HISTORY = 'video_history_list';
        const STORAGE_KEY_STATE = 'video_app_state';
        const SKIP_TIME = 24;

        let hls = null;
        const video = document.getElementById('main-video-player');
        const playerModal = document.getElementById('player-modal');
        const historyModal = document.getElementById('history-modal');
        const historyListEl = document.getElementById('history-list');
        
        let isPlayerOpen = false;
        let currentVideoData = null;
        let hasSkipped = false;

        // --- 本地存储工具 ---
        function getStorage(key, defaultVal) {
            try { const val = localStorage.getItem(key); return val ? JSON.parse(val) : defaultVal; } catch (e) { return defaultVal; }
        }
        function setStorage(key, val) { localStorage.setItem(key, JSON.stringify(val)); }

        // --- 历史逻辑 ---
        function addToHistory(item) {
            if (!item || !item.id) return;
            let history = getStorage(STORAGE_KEY_HISTORY, []);
            history = history.filter(h => h.id !== item.id);
            history.unshift({
                id: item.id,
                title: item.title || item.vod_name,
                poster: item.poster || item.vod_pic || item.thumbnail,
                featureId: item.feature_id || item.vod_id,
                url: item.url || item.vod_play_url,
                timestamp: Date.now()
            });
            if (history.length > 50) history.pop();
            setStorage(STORAGE_KEY_HISTORY, history);
        }
        function deleteHistoryItem(id) {
            let history = getStorage(STORAGE_KEY_HISTORY, []);
            history = history.filter(h => h.id !== id);
            setStorage(STORAGE_KEY_HISTORY, history);
            renderHistoryList();
        }
        function clearHistory() {
            if(confirm('确定清空所有历史？')) {
                setStorage(STORAGE_KEY_HISTORY, []);
                renderHistoryList();
            }
        }
        function toggleHistoryModal(show) {
            if (show) { renderHistoryList(); historyModal.classList.add('active'); document.body.style.overflow = 'hidden'; } 
            else { historyModal.classList.remove('active'); document.body.style.overflow = ''; }
        }
        function renderHistoryList() {
            const history = getStorage(STORAGE_KEY_HISTORY, []);
            historyListEl.innerHTML = '';
            if (history.length === 0) { historyListEl.innerHTML = '<div class="empty-history">暂无观看记录</div>'; return; }
            history.forEach(item => {
                const date = new Date(item.timestamp).toLocaleString();
                const div = document.createElement('div');
                div.className = 'history-item';
                div.innerHTML = `
                    <img src="${item.poster}" class="history-thumb" onerror="this.src='https://via.placeholder.com/120x68?text=No+Img'">
                    <div class="history-info">
                        <h4 class="history-title">${item.title}</h4>
                        <div class="history-meta"><span>${item.featureId || '未知'}</span><span>${date}</span></div>
                    </div>
                    <button class="history-delete" onclick="deleteHistoryItem('${item.id}')">🗑️ 删除</button>
                `;
                div.onclick = (e) => { if (!e.target.classList.contains('history-delete')) { openPlayer(item.url, item.title, item.id, item.poster); toggleHistoryModal(false); } };
                historyListEl.appendChild(div);
            });
        }

        // --- 播放器逻辑 (含 24s 跳转) ---
        function openPlayer(url, title, id, poster) {
            if (!url) return;
            console.log('▶️ Opening player:', title, id);
            isPlayerOpen = true;
            hasSkipped = false;
            currentVideoData = { id, title, url, poster: poster || '' };
            
            // 尝试补充完整数据
            if (window.Renderer && window.Renderer.allData) {
                const full = window.Renderer.allData.find(i => (i.feature_id || i.vod_id || i.id) === id);
                if (full) currentVideoData = { ...currentVideoData, ...full };
            }

            addToHistory(currentVideoData);
            markAsWatched(id);

            playerModal.classList.add('active');
            document.body.style.overflow = 'hidden';
            
            if (hls) { hls.destroy(); hls = null; }
            video.src = '';
            video.load();

            const startPlayback = () => { video.play().catch(e=>{}); video.focus(); };

            if (url.includes('.m3u8')) {
                if (Hls.isSupported()) {
                    hls = new Hls();
                    hls.loadSource(url);
                    hls.attachMedia(video);
                    hls.on(Hls.Events.MANIFEST_PARSED, startPlayback);
                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = url;
                    video.addEventListener('loadedmetadata', startPlayback, {once:true});
                } else { alert('不支持 m3u8'); closePlayer(); }
            } else {
                video.src = url;
                video.addEventListener('loadedmetadata', startPlayback, {once:true});
            }
        }

        function closePlayer() {
            if (!isPlayerOpen) return;
            isPlayerOpen = false;
            currentVideoData = null;
            playerModal.classList.remove('active');
            document.body.style.overflow = '';
            video.pause();
            video.src = '';
            if (hls) { hls.destroy(); hls = null; }
            if (window.Renderer) window.Renderer.renderPage(); // 刷新标记
        }
        playerModal.onclick = (e) => { if (e.target === playerModal) closePlayer(); };
        historyModal.onclick = (e) => { if (e.target === historyModal) toggleHistoryModal(false); };

        // *** 24秒跳转核心 ***
        video.addEventListener('timeupdate', () => {
            if (!isPlayerOpen || hasSkipped) return;
            if (video.currentTime > 0.5 && video.currentTime < SKIP_TIME) {
                console.log(`⏩ Skip: ${video.currentTime.toFixed(1)} -> ${SKIP_TIME}`);
                video.currentTime = SKIP_TIME;
                hasSkipped = true;
            }
        });

        // --- 标记逻辑 ---
        function markAsWatched(id) {
            if (!id) return;
            const list = getStorage(STORAGE_KEY_WATCHED, []);
            if (!list.includes(id)) { list.push(id); setStorage(STORAGE_KEY_WATCHED, list); }
        }
        function isWatched(id) {
            if (!id) return false;
            return getStorage(STORAGE_KEY_WATCHED, []).includes(id);
        }

        // --- 搜索逻辑 ---
              // ================= 🔍 最终版搜索逻辑 (仅匹配 vod_name) =================
        function initSearch() {
            const input = document.getElementById('feature-search-input');
            const btn = document.getElementById('feature-search-btn');
            
            if (!input || !btn) {
                console.error('❌ Search elements not found!');
                return;
            }

            const performSearch = () => {
                const query = input.value.trim();
                console.log('🔍 [Search] Query:', query);

                if (!window.Renderer || !window.Renderer.allData) {
                    console.warn('⚠️ Data not ready yet.');
                    return;
                }

                const allData = window.Renderer.allData;
                let filtered = [];

                if (!query) {
                    // 空搜索显示全部
                    filtered = allData;
                    console.log('🔄 [Search] Reset to all data.');
                } else {
                    const lowerQuery = query.toLowerCase();
                    
                    // 【核心修改】仅匹配 vod_name 字段
                    filtered = allData.filter(item => {
                        const vodName = String(item.vod_name || '').toLowerCase();
                        return vodName.includes(lowerQuery);
                    });

                    console.log(`🔍 [Search] Matched ${filtered.length} items based on vod_name only.`);
                }

                // 更新 Renderer 状态
                window.Renderer.filteredData = filtered;
                window.Renderer.currentQuery = query;
                window.Renderer.currentPage = 1; // 重置回第一页
                window.Renderer.totalPages = Math.max(1, Math.ceil(filtered.length / (window.Renderer.pageSize || 20)));
                
                // 触发重新渲染
                if (typeof window.Renderer.renderPage === 'function') window.Renderer.renderPage();
                if (typeof window.Renderer.renderPaginationControls === 'function') window.Renderer.renderPaginationControls();
                if (typeof window.Renderer.updateNavButtons === 'function') window.Renderer.updateNavButtons();

                // 更新顶部统计文字
                const statsEl = document.getElementById('stats-total');
                if(statsEl) {
                    statsEl.innerText = query ? `搜索结果: "${query}" 共 ${filtered.length} 条` : `总视频数: ${allData.length}`;
                }

                // 如果没有结果，显示提示
                const grid = document.getElementById('video-grid');
                if (filtered.length === 0 && query && grid) {
                    grid.innerHTML = `
                        <div style="grid-column: 1/-1; text-align: center; padding: 60px 20px; color: #aaa;">
                            <svg style="width: 64px; height: 64px; margin-bottom: 16px; opacity: 0.5;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            <h3>未找到相关视频</h3>
                            <p>请检查输入的标题关键词是否正确。</p>
                        </div>
                    `;
                }
            };

            // 绑定事件
            btn.onclick = (e) => { e.preventDefault(); performSearch(); };
            input.onkeydown = (e) => { 
                if (e.key === 'Enter') { 
                    e.preventDefault(); 
                    performSearch(); 
                    input.blur(); 
                } 
            };
            
            console.log('✅ [Search] Initialized (Target: vod_name ONLY).');
        }

        // --- 全局初始化协调 ---
        window.addEventListener('DOMContentLoaded', () => {
            console.log('🚀 DOMContentLoaded');
            
            // 1. 绑定历史按钮
            document.getElementById('open-history-btn')?.addEventListener('click', () => toggleHistoryModal(true));
            
            // 2. 初始化搜索
            initSearch();

            // 3. 返回顶部
            const backBtn = document.getElementById('back-to-top');
            if (backBtn) {
                window.addEventListener('scroll', () => {
                    if (window.scrollY > 300) backBtn.classList.add('show');
                    else backBtn.classList.remove('show');
                });
                backBtn.onclick = () => window.scrollTo({ top: 0, behavior: 'smooth' });
            }

            // 4. 检查数据加载状态 (兜底机制)
            // 如果 loader.js 正常工作，它会调用 Renderer.renderAll()
            // 如果一段时间后 Renderer.allData 还是空的，说明加载失败
            window.videoDataLoaded = true; // 添加这一行以兼容 index.html 的检查
            
        });

        // 键盘监听
        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT') return;
            if (isPlayerOpen) { if (e.key === 'Escape' || e.key.toLowerCase() === 'q') closePlayer(); return; }
            if (historyModal.classList.contains('active')) { if (e.key === 'Escape') toggleHistoryModal(false); return; }
            if (window.Renderer) {
                if (e.key === 'ArrowLeft' && window.Renderer.currentPage > 1) {
                    window.Renderer.currentPage--; window.Renderer.renderPage(); window.Renderer.renderPaginationControls(); window.Renderer.saveState();
                } else if (e.key === 'ArrowRight' && window.Renderer.currentPage < window.Renderer.totalPages) {
                    window.Renderer.currentPage++; window.Renderer.renderPage(); window.Renderer.renderPaginationControls(); window.Renderer.saveState();
                }
            }
        });
    </script>
